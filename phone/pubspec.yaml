name: avodah_viewer
description: Read-only daily plan viewer for Avodah
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.0
  http: ^1.2.0
  flutter_markdown: ^0.7.0
  flutter_pdfview: ^1.4.4

  # Local Database (Drift - SQLite)
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.0

  # Shared core (CRDT, storage, documents)
  avodah_core:
    path: ../packages/avodah_core

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  drift_dev: ^2.22.1

flutter:
  uses-material-design: true
